<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        .red{
            color: red;
            font-size: 40px;
            font-weight: bold;
        }

        .green{
            color: green;
            font-size: 40px;
            font-weight: bold;
        }

        a{
            text-decoration: none;
            font-size: 20px;
        }
    </style>
</head>

<body>

<h1>Prediction Result</h1>

{% if prediction == "Heart Disease" %}
    <h2 class="red">{{ prediction }}</h2>
{% else %}
    <h2 class="green">{{ prediction }}</h2>
{% endif %}

<br>

<a href="/">🔙 Predict Again</a>

</body>
</html>
